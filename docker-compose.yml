services:
  mts:
    build: .
    container_name: mts
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mts-data:/data
    environment:
      - MTS_DB_PATH=/data/mts.db
      - TZ=UTC

  dashboard:
    build: ./dashboard
    container_name: mts-dashboard
    restart: unless-stopped
    ports:
      - "8070:8080"
    volumes:
      - mts-data:/data
    environment:
      - MTS_DB_PATH=/data/mts.db

volumes:
  mts-data:
