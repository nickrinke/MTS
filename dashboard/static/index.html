<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTS — Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0c0e;
  --bg-card: #0f1114;
  --bg-card-hover: #141720;
  --border: #1a1e26;
  --border-bright: #252b36;
  --text: #c8cdd5;
  --text-dim: #6b7280;
  --text-bright: #e8ecf2;
  --green: #00ff88;
  --green-dim: #00ff8833;
  --red: #ff4466;
  --red-dim: #ff446633;
  --amber: #ffaa00;
  --amber-dim: #ffaa0033;
  --blue: #4488ff;
  --blue-dim: #4488ff33;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scanline overlay ── */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

/* ── Header ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 32px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.logo h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: -0.5px;
}

.logo span {
  font-size: 13px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}

.header-status {
  display: flex;
  align-items: center;
  gap: 16px;
}

.pulse-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--green-dim); }
  50% { opacity: 0.7; box-shadow: 0 0 0 8px transparent; }
}

.last-scan {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
}

.next-scan {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--green);
  padding: 4px 10px;
  border: 1px solid var(--green-dim);
  border-radius: 4px;
  background: var(--green-dim);
}

.next-scan.soon {
  color: var(--amber);
  border-color: var(--amber-dim);
  background: var(--amber-dim);
  animation: pulse-amber 1.5s infinite;
}

@keyframes pulse-amber {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ── Alert Feed ── */
.alert-entry {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.alert-entry:last-child { border-bottom: none; }
.alert-entry:hover { background: var(--bg-card-hover); }

.alert-icon {
  font-size: 16px;
  min-width: 24px;
  text-align: center;
}

.alert-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 100px;
}

.alert-type {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  min-width: 80px;
}

.alert-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
}

/* ── News Feed ── */
.news-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.news-item:last-child { border-bottom: none; }
.news-item:hover { background: var(--bg-card-hover); }

.news-item a {
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  line-height: 1.5;
  flex: 1;
}

.news-item a:hover { color: var(--text-bright); }

.news-icon {
  font-size: 14px;
  min-width: 20px;
  text-align: center;
  padding-top: 2px;
}

.news-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 100px;
  text-align: right;
}

.news-source {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 2px;
}

.news-signal {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
}

/* ── Stats Row ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  transition: border-color 0.2s;
}

.stat-card:hover {
  border-color: var(--border-bright);
}

.stat-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  color: var(--text-bright);
}

.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }
.stat-value.blue { color: var(--blue); }

.stat-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* ── Sections ── */
.section {
  margin-bottom: 40px;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.section-tabs {
  display: flex;
  gap: 4px;
}

.tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}

.tab:hover { border-color: var(--border-bright); color: var(--text); }
.tab.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

/* ── Signals Table ── */
.signals-table {
  width: 100%;
  border-collapse: collapse;
}

.signals-table th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  text-align: left;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}

.signals-table td {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.signals-table tr:hover td {
  background: var(--bg-card-hover);
}

.signals-table tr { cursor: pointer; }

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.badge-long { background: var(--green-dim); color: var(--green); }
.badge-short { background: var(--red-dim); color: var(--red); }
.badge-open { background: var(--blue-dim); color: var(--blue); }
.badge-hit-target { background: var(--green-dim); color: var(--green); }
.badge-hit-stop { background: var(--red-dim); color: var(--red); }
.badge-expired { background: var(--amber-dim); color: var(--amber); }

/* ── Scan Log ── */
.scan-entry {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.scan-entry:hover { background: var(--bg-card-hover); }

.scan-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 120px;
}

.scan-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  min-width: 50px;
}

.scan-summary {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
}

/* ── Charts ── */
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 32px;
}

.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}

.chart-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.bar-chart {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.bar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  min-width: 60px;
  text-align: right;
}

.bar-track {
  flex: 1;
  height: 24px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
  display: flex;
  align-items: center;
  padding-left: 8px;
}

.bar-fill span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--bg);
}

.bar-fill.green { background: var(--green); }
.bar-fill.red { background: var(--red); }
.bar-fill.amber { background: var(--amber); }
.bar-fill.blue { background: var(--blue); }

/* ── Outcome Ring ── */
.outcome-ring {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.ring-container {
  position: relative;
  width: 180px;
  height: 180px;
}

.ring-container canvas {
  width: 180px;
  height: 180px;
}

.ring-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.ring-center .big {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--text-bright);
}

.ring-center .small {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.ring-legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-left: 32px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}

.legend-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
}

.legend-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-left: auto;
}

/* ── Signal Detail Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 24px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-bright);
  border-radius: 12px;
  max-width: 640px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 32px;
}

.modal-close {
  float: right;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.modal-close:hover { color: var(--text); }

.modal h2 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  color: var(--green);
  margin-bottom: 20px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.detail-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.detail-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-bright);
  text-align: right;
  max-width: 60%;
}

.detail-thesis {
  margin-top: 16px;
  padding: 16px;
  background: var(--bg);
  border-radius: 6px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
}

/* ── Loading ── */
.loading {
  text-align: center;
  padding: 60px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
}

.loading::after {
  content: '';
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
}

/* ── Show More Toggle ── */
.show-more-btn {
  display: block;
  width: 100%;
  padding: 12px;
  background: var(--bg-card);
  border: none;
  border-top: 1px solid var(--border);
  color: var(--green);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
}

.show-more-btn:hover { background: var(--bg-card-hover); }

tr.item-hidden,
div.item-hidden { display: none !important; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .chart-row { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  header { flex-direction: column; gap: 12px; align-items: flex-start; }
  .stat-value { font-size: 24px; }
  .signals-table { font-size: 11px; }
  .signals-table th, .signals-table td { padding: 10px 8px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <h1>MTS</h1>
      <span>Monitor The Situation</span>
    </div>
    <div class="header-status">
      <div class="next-scan" id="nextScan"></div>
      <div class="pulse-dot" id="pulse"></div>
      <div class="last-scan" id="lastScan">Loading...</div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-label">Total Signals</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Open</div><div class="stat-value blue" id="statOpen">—</div></div>
    <div class="stat-card"><div class="stat-label">Hit Rate</div><div class="stat-value green" id="statHitRate">—</div><div class="stat-sub" id="statHitSub"></div></div>
    <div class="stat-card"><div class="stat-label">Avg Conf (W/L)</div><div class="stat-value" id="statConf">—</div></div>
  </div>

  <!-- Charts -->
  <div class="chart-row">
    <div class="chart-card">
      <div class="chart-title">Outcome Breakdown</div>
      <div class="outcome-ring" id="outcomeRing"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">By Instrument</div>
      <div class="bar-chart" id="instrumentChart"></div>
    </div>
  </div>

  <!-- News Feed -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">Headlines</div>
      <div class="section-tabs">
        <button class="tab active" onclick="filterNews('all')">All</button>
        <button class="tab" onclick="filterNews('analysis')">MTS Analysis</button>
        <button class="tab" onclick="filterNews('articles')">Live News</button>
      </div>
    </div>
    <div class="news-feed" id="newsFeed" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; max-height: 500px; overflow-y: auto;"></div>
  </div>

  <!-- Signals -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">Signals</div>
      <div class="section-tabs">
        <button class="tab active" onclick="filterSignals('all')">All</button>
        <button class="tab" onclick="filterSignals('OPEN')">Open</button>
        <button class="tab" onclick="filterSignals('HIT_TARGET')">Winners</button>
        <button class="tab" onclick="filterSignals('HIT_STOP')">Losers</button>
        <button class="tab" onclick="filterSignals('EXPIRED')">Expired</button>
      </div>
    </div>
    <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;">
      <table class="signals-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Type</th>
            <th>Dir</th>
            <th>Instrument</th>
            <th>Conf</th>
            <th>Entry</th>
            <th>Target</th>
            <th>Stop</th>
            <th>Outcome</th>
            <th>P&L</th>
          </tr>
        </thead>
        <tbody id="signalsBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Scan History -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">Scan History</div>
    </div>
    <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;" id="scanLog"></div>
  </div>

  <!-- Alert Feed -->
  <div class="section">
    <div class="section-header">
      <div class="section-title">Alert Feed</div>
    </div>
    <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;" id="alertFeed"></div>
  </div>
</div>

<!-- Signal Detail Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="modalTitle"></h2>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const API = '';

// ── State ──
let allSignals = [];
let currentFilter = 'all';
let lastScanTime = null;
const SCAN_INTERVAL = 4 * 60 * 60 * 1000; // 4 hours in ms

// ── Fetch helpers ──
async function fetchJSON(url) {
  const res = await fetch(API + url);
  return res.json();
}

// ── Init ──
async function init() {
  await Promise.all([
    loadStatus(),
    loadPerformance(),
    loadSignals(),
    loadScans(),
    loadAlerts(),
    loadNews(),
  ]);
  // Countdown ticker every second
  setInterval(updateCountdown, 1000);
  // Auto-refresh every 60s
  setInterval(() => {
    loadStatus();
    loadSignals();
    loadAlerts();
  }, 60000);
  // Refresh news every 5 min
  setInterval(loadNews, 300000);
}

// ── Countdown ──
function updateCountdown() {
  if (!lastScanTime) return;
  const nextScan = new Date(lastScanTime.getTime() + SCAN_INTERVAL);
  const diff = nextScan.getTime() - Date.now();
  const el = document.getElementById('nextScan');

  if (diff <= 0) {
    el.textContent = 'SCANNING...';
    el.classList.add('soon');
    return;
  }

  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const timeStr = h > 0
    ? `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`
    : `${m}m ${String(s).padStart(2,'0')}s`;

  el.textContent = `Next scan: ${timeStr}`;
  el.classList.toggle('soon', diff < 600000); // amber when < 10 min
}

// ── Status ──
async function loadStatus() {
  const data = await fetchJSON('/api/status');
  if (data.last_scan) {
    const ts = new Date(data.last_scan.timestamp);
    lastScanTime = ts;
    const ago = timeAgo(ts);
    document.getElementById('lastScan').textContent = `Last scan: ${ago}`;
    const hours = (Date.now() - ts.getTime()) / 3600000;
    document.getElementById('pulse').style.background = hours > 5 ? 'var(--red)' : 'var(--green)';
    updateCountdown();
  }
  document.getElementById('statTotal').textContent = data.total_signals;
  document.getElementById('statOpen').textContent = data.open_signals;
  document.getElementById('statHitRate').textContent = data.resolved_signals > 0 ? data.hit_rate + '%' : '—';
  document.getElementById('statHitSub').textContent = data.resolved_signals > 0
    ? `${data.hits}/${data.resolved_signals} resolved`
    : 'no resolved signals yet';
}

// ── Performance ──
async function loadPerformance() {
  const data = await fetchJSON('/api/performance');

  // Confidence stat
  document.getElementById('statConf').textContent =
    data.avg_winner_confidence || data.avg_loser_confidence
      ? `${data.avg_winner_confidence} / ${data.avg_loser_confidence}`
      : '—';

  // Outcome ring
  drawOutcomeRing(data.outcomes);

  // Instrument chart
  drawInstrumentChart(data.instrument_stats);
}

function drawOutcomeRing(outcomes) {
  const container = document.getElementById('outcomeRing');
  const hits = outcomes['HIT_TARGET'] || 0;
  const stops = outcomes['HIT_STOP'] || 0;
  const expired = outcomes['EXPIRED'] || 0;
  const open = outcomes['OPEN'] || 0;
  const total = hits + stops + expired + open;

  if (total === 0) {
    container.innerHTML = '<div class="loading">No signals yet</div>';
    return;
  }

  container.innerHTML = `
    <div class="ring-container">
      <canvas id="ringCanvas" width="180" height="180"></canvas>
      <div class="ring-center">
        <div class="big">${total}</div>
        <div class="small">signals</div>
      </div>
    </div>
    <div class="ring-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span class="legend-text">Target</span><span class="legend-count">${hits}</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div><span class="legend-text">Stopped</span><span class="legend-count">${stops}</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div><span class="legend-text">Expired</span><span class="legend-count">${expired}</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div><span class="legend-text">Open</span><span class="legend-count">${open}</span></div>
    </div>
  `;

  const canvas = document.getElementById('ringCanvas');
  const ctx = canvas.getContext('2d');
  const cx = 90, cy = 90, r = 70, lw = 16;
  const segments = [
    { val: hits, color: '#00ff88' },
    { val: stops, color: '#ff4466' },
    { val: expired, color: '#ffaa00' },
    { val: open, color: '#4488ff' },
  ];

  let angle = -Math.PI / 2;
  segments.forEach(seg => {
    if (seg.val === 0) return;
    const sweep = (seg.val / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, angle, angle + sweep);
    ctx.strokeStyle = seg.color;
    ctx.lineWidth = lw;
    ctx.lineCap = 'butt';
    ctx.stroke();
    angle += sweep + 0.04; // small gap
  });
}

function drawInstrumentChart(stats) {
  const container = document.getElementById('instrumentChart');
  if (!stats || stats.length === 0) {
    container.innerHTML = '<div class="loading">No data yet</div>';
    return;
  }

  const maxTotal = Math.max(...stats.map(s => s.total));
  container.innerHTML = stats.slice(0, 8).map(s => {
    const pct = (s.total / maxTotal) * 100;
    const hitPct = s.total > 0 ? Math.round(s.hits / s.total * 100) : 0;
    const color = hitPct >= 60 ? 'green' : hitPct >= 40 ? 'amber' : 'red';
    const pnlStr = s.avg_pnl != null ? `${s.avg_pnl > 0 ? '+' : ''}${s.avg_pnl.toFixed(1)}%` : '';
    return `
      <div class="bar-row">
        <div class="bar-label">${s.instrument}</div>
        <div class="bar-track">
          <div class="bar-fill ${color}" style="width:${pct}%"><span>${s.total} (${hitPct}% hit) ${pnlStr}</span></div>
        </div>
      </div>
    `;
  }).join('');
}

// ── Signals ──
async function loadSignals() {
  allSignals = await fetchJSON('/api/signals?limit=100');
  renderSignals();
}

function filterSignals(status) {
  currentFilter = status;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderSignals();
}

function renderSignals() {
  const VISIBLE = 5;
  const filtered = currentFilter === 'all'
    ? allSignals
    : allSignals.filter(s => s.outcome === currentFilter);

  const tbody = document.getElementById('signalsBody');
  tbody.innerHTML = filtered.map((s, i) => {
    const ts = new Date(s.timestamp);
    const dirClass = s.direction === 'LONG' ? 'badge-long' : 'badge-short';
    const outcomeClass = {
      'OPEN': 'badge-open',
      'HIT_TARGET': 'badge-hit-target',
      'HIT_STOP': 'badge-hit-stop',
      'EXPIRED': 'badge-expired',
    }[s.outcome] || '';

    const pnl = s.outcome_pnl_pct != null
      ? `<span style="color:${s.outcome_pnl_pct >= 0 ? 'var(--green)' : 'var(--red)'}">${s.outcome_pnl_pct > 0 ? '+' : ''}${s.outcome_pnl_pct}%</span>`
      : '—';

    const hiddenClass = i >= VISIBLE ? 'item-hidden' : '';
    return `
      <tr class="${hiddenClass}" onclick="openSignal(${s.id})">
        <td>${formatDate(ts)}</td>
        <td>${s.scan_type}</td>
        <td><span class="badge ${dirClass}">${s.direction}</span></td>
        <td>${s.instrument || '—'}</td>
        <td>${s.confidence_score}/10</td>
        <td>${s.entry_zone || '—'}</td>
        <td>${s.target || '—'}</td>
        <td>${s.stop_loss || '—'}</td>
        <td><span class="badge ${outcomeClass}">${s.outcome}</span></td>
        <td>${pnl}</td>
      </tr>
    `;
  }).join('');

  // Add show more button
  const tableWrapper = tbody.closest('div');
  const existingBtn = tableWrapper.querySelector('.show-more-btn');
  if (existingBtn) existingBtn.remove();
  if (filtered.length > VISIBLE) {
    const btn = document.createElement('button');
    btn.className = 'show-more-btn';
    btn.textContent = `Show all ${filtered.length} signals`;
    btn.onclick = () => {
      tbody.querySelectorAll('.item-hidden').forEach(r => r.classList.remove('item-hidden'));
      btn.remove();
    };
    tableWrapper.appendChild(btn);
  }

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-dim);padding:40px">No signals</td></tr>';
  }
}

// ── Signal Detail ──
async function openSignal(id) {
  const data = await fetchJSON(`/api/signals/${id}`);
  if (data.error) return;

  const analysis = data.full_analysis || {};
  const trade = analysis.trade || {};

  document.getElementById('modalTitle').textContent =
    `${data.direction} ${data.instrument} — ${data.scan_type}`;

  const rows = [
    ['Time', formatDate(new Date(data.timestamp))],
    ['Confidence', `${data.confidence_score}/10`],
    ['Direction', data.direction],
    ['Instrument', data.instrument],
    ['Entry Zone', data.entry_zone],
    ['Target', data.target],
    ['Stop Loss', data.stop_loss],
    ['Max Hold', `${data.max_hold_days || '—'} days`],
    ['Outcome', data.outcome],
    ['Outcome Price', data.outcome_price ? `$${data.outcome_price}` : '—'],
    ['P&L', data.outcome_pnl_pct != null ? `${data.outcome_pnl_pct}%` : '—'],
    ['Risk Level', analysis.risk_level || '—'],
    ['Already Priced In', analysis.already_priced_in ? 'Yes' : 'No'],
    ['Calendar Risk', analysis.calendar_risk || '—'],
  ];

  let html = rows.map(([label, value]) =>
    `<div class="detail-row"><div class="detail-label">${label}</div><div class="detail-value">${value}</div></div>`
  ).join('');

  if (analysis.event_summary) {
    html += `<div class="detail-thesis"><strong style="color:var(--green)">Event:</strong> ${analysis.event_summary}</div>`;
  }
  if (analysis.thesis) {
    html += `<div class="detail-thesis"><strong style="color:var(--green)">Thesis:</strong> ${analysis.thesis}</div>`;
  }
  if (analysis.historical_precedent) {
    html += `<div class="detail-thesis"><strong style="color:var(--green)">Precedent:</strong> ${analysis.historical_precedent}</div>`;
  }

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Scans ──
async function loadScans() {
  const VISIBLE = 5;
  const scans = await fetchJSON('/api/scans?limit=20');
  const container = document.getElementById('scanLog');

  container.innerHTML = scans.map((s, i) => {
    const ts = new Date(s.timestamp);
    const scoreColor = s.confidence_score >= 8 ? 'var(--green)'
      : s.confidence_score >= 6 ? 'var(--amber)'
      : 'var(--text-dim)';
    const signalTag = s.signal_detected ? '<span class="badge badge-long">SIGNAL</span> ' : '';
    const hiddenClass = i >= VISIBLE ? 'item-hidden' : '';

    return `
      <div class="scan-entry ${hiddenClass}">
        <div class="scan-time">${formatDate(ts)}<br><span style="color:var(--text-dim)">${s.scan_type}</span></div>
        <div class="scan-score" style="color:${scoreColor}">${s.confidence_score}/10</div>
        <div class="scan-summary">${signalTag}${s.event_summary || 'No notable events.'}</div>
      </div>
    `;
  }).join('');

  if (scans.length > VISIBLE) {
    container.innerHTML += `<button class="show-more-btn" onclick="this.parentElement.querySelectorAll('.item-hidden').forEach(e=>e.classList.remove('item-hidden'));this.remove()">Show all ${scans.length} scans</button>`;
  }

  if (scans.length === 0) {
    container.innerHTML = '<div class="loading">No scans yet</div>';
  }
}

// ── Alert Feed ──
async function loadAlerts() {
  const VISIBLE = 5;
  const alerts = await fetchJSON('/api/alerts?limit=20');
  const container = document.getElementById('alertFeed');

  container.innerHTML = alerts.map((a, i) => {

        <div class="alert-type" style="color:${typeColor}">${a.scan_type}</div>
        <div class="alert-text">${a.event_summary || '—'}</div>

  if (alerts.length > VISIBLE) {

  }

  if (alerts.length === 0) {
    container.innerHTML = '<div class="loading">No alerts yet</div>';
  }
}

// ── News Feed ──
let newsData = { articles: [], analysis: [] };
let newsFilter = 'all';

async function loadNews() {
  newsData = await fetchJSON('/api/headlines');
  renderNews();
}

function filterNews(filter) {
  newsFilter = filter;
  document.querySelectorAll('.section-tabs .tab').forEach(t => {
    // Only update tabs in the news section
    if (t.onclick && t.onclick.toString().includes('filterNews')) {
      t.classList.remove('active');
    }
  });
  event.target.classList.add('active');
  renderNews();
}

function renderNews() {
  const container = document.getElementById('newsFeed');
  let items = [];

  // MTS analysis items
  if (newsFilter === 'all' || newsFilter === 'analysis') {
    (newsData.analysis || []).forEach(s => {
      const ts = new Date(s.timestamp);
      const scoreColor = s.confidence_score >= 8 ? 'var(--green)'
        : s.confidence_score >= 6 ? 'var(--amber)' : 'var(--text-dim)';
      const signalBadge = s.signal_detected
        ? `<span class="news-signal" style="background:var(--green-dim);color:var(--green)">SIGNAL ${s.confidence_score}/10</span>`
        : `<span class="news-signal" style="background:var(--bg);color:${scoreColor}">${s.confidence_score}/10</span>`;

      items.push({
        sort: ts.getTime(),
        html: `
          <div class="news-item">
            <div class="news-icon">🔍</div>
            <a href="#">${s.event_summary || 'No notable events.'}</a>
            ${signalBadge}
            <div class="news-meta">${formatDate(ts)}<br><span style="color:var(--green)">${s.scan_type}</span></div>
          </div>`
      });
    });
  }

  // Live articles
  if (newsFilter === 'all' || newsFilter === 'articles') {
    (newsData.articles || []).forEach(a => {
      const ts = a.date ? new Date(a.date) : new Date();
      const source = (a.source || '').replace('Google News - ', '').substring(0, 30);
      items.push({
        sort: ts.getTime(),
        html: `
          <div class="news-item">
            <div class="news-icon">📰</div>
            <a href="${a.url}" target="_blank">${a.title}</a>
            <div class="news-meta">${a.date ? formatDate(ts) : ''}<div class="news-source">${source}</div></div>
          </div>`
      });
    });
  }

  // Sort by time, newest first
  const VISIBLE = 6;
  items.sort((a, b) => b.sort - a.sort);
  container.innerHTML = items.map((item, i) => {
    return item.html.replace('class="news-item"', `class="news-item ${i >= VISIBLE ? 'item-hidden' : ''}"`);
  }).join('');

  if (items.length > VISIBLE) {
    container.innerHTML += `<button class="show-more-btn" onclick="this.parentElement.querySelectorAll('.item-hidden').forEach(e=>e.classList.remove('item-hidden'));this.remove()">Show all ${items.length} headlines</button>`;
  }

  if (items.length === 0) {
    container.innerHTML = '<div class="loading">No headlines yet</div>';
  }
}

// ── Helpers ──
function formatDate(d) {
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${m}/${day} ${h}:${min}`;
}

function timeAgo(d) {
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}
